<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reel Transcriber</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
          <path d="M10 8l6 4-6 4V8z"/>
        </svg>
      </div>
      <h1>Reel Transcriber</h1>
      <p class="subtitle">Paste an Instagram reel link and get the transcript instantly</p>
    </div>

    <div class="card">
      <div class="provider-toggle">
        <label class="provider-option">
          <input type="radio" name="provider" value="openai" checked>
          <span class="provider-label">
            <span class="provider-name">OpenAI Whisper</span>
            <span class="provider-desc">Fast &amp; accurate, returns language info</span>
          </span>
        </label>
        <label class="provider-option">
          <input type="radio" name="provider" value="gemini">
          <span class="provider-label">
            <span class="provider-name">Google Gemini</span>
            <span class="provider-desc">Sends video directly, no audio extraction</span>
          </span>
        </label>
      </div>

      <form id="transcribe-form">
        <div class="input-group">
          <input
            type="text"
            id="reel-url"
            placeholder="https://www.instagram.com/reel/..."
            autocomplete="off"
            spellcheck="false"
          >
          <button type="submit" id="submit-btn">
            <span id="btn-text">Transcribe</span>
            <span id="btn-spinner" class="spinner hidden"></span>
          </button>
        </div>

        <div class="options-row">
          <label for="language" class="options-label">Language</label>
          <select id="language">
            <option value="auto">Auto-detect</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="pt">Portuguese</option>
            <option value="it">Italian</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="ru">Russian</option>
            <option value="tr">Turkish</option>
          </select>
        </div>
      </form>

      <div id="status" class="status hidden">
        <span class="status-spinner"></span>
        <span id="status-text">Downloading and transcribing reel...</span>
      </div>
    </div>

    <div id="warning-box" class="warning-box hidden"></div>

    <div id="result-box" class="result-box hidden">
      <div class="result-header">
        <div class="result-meta" id="result-meta"></div>
        <button id="copy-btn" class="copy-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          <span id="copy-text">Copy</span>
        </button>
      </div>
      <pre id="transcript"></pre>
    </div>

    <div id="error-box" class="error-box hidden">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span id="error-text"></span>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
